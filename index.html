<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <title>My Revision</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        /* Refined iOS Safari Dark Theme */
        :root {
            --bg: #000000;
            --surface: #1c1c1e;
            --surface-hover: #2c2c2e;
            --text: #ffffff;
            --subtext: #8e8e93;
            --accent: #0a84ff;
            --danger: #ff453a;
            --border: #38383a;
        }
        
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", Roboto, sans-serif; }
        
        body {
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: max(20px, env(safe-area-inset-top)) 20px max(20px, env(safe-area-inset-bottom)) 20px;
            -webkit-font-smoothing: antialiased;
        }

        .screen { display: none; animation: fadeIn 0.3s ease; }
        .active { display: block; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Typography & Headers */
        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }
        
        h1 { margin: 0; font-size: 34px; font-weight: 700; letter-spacing: -0.5px; }
        h2 { margin: 0 0 16px 0; font-size: 22px; font-weight: 600; }
        
        /* Inputs & Buttons */
        input:not([type="search"]), textarea {
            width: 100%;
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            font-size: 17px;
            outline: none;
            transition: border-color 0.2s;
        }
        
        input:focus, textarea:focus { border-color: var(--accent); }
        textarea { min-height: 300px; resize: none; line-height: 1.5; }
        
        /* Search Bar styling */
        .search-bar {
            width: 100%;
            background: var(--surface);
            color: var(--text);
            border: none;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 17px;
            margin-bottom: 20px;
            outline: none;
            -webkit-appearance: none;
        }
        .search-bar::placeholder { color: var(--subtext); }

        button {
            width: 100%;
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 12px;
            transition: opacity 0.2s;
        }
        button:active { opacity: 0.7; }
        
        button.text-btn {
            width: auto;
            background: transparent;
            color: var(--accent);
            padding: 8px 0;
            font-size: 17px;
            font-weight: 500;
            margin: 0;
        }

        /* Floating Controls Container for Reading Mode */
        .floating-controls {
            position: fixed;
            top: max(16px, env(safe-area-inset-top));
            right: 16px;
            display: flex;
            gap: 8px;
            z-index: 9999;
        }

        /* Individual Floating Buttons */
        .floating-btn {
            width: auto;
            background: rgba(28, 28, 30, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: var(--accent);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 500;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            margin: 0;
            transition: background 0.2s;
        }

        /* Note Cards */
        .note-card {
            background: var(--surface);
            padding: 18px;
            border-radius: 16px;
            margin-bottom: 16px;
            position: relative;
            cursor: pointer;
            border: 1px solid transparent;
            transition: transform 0.1s, background 0.2s;
        }
        .note-card:active { transform: scale(0.98); background: var(--surface-hover); }
        .note-card h3 { margin: 0 0 6px 0; font-size: 19px; padding-right: 40px; }
        .note-card p { margin: 0; color: var(--subtext); font-size: 15px; }

        /* Delete Button */
        .delete-btn {
            position: absolute;
            top: 16px;
            right: 16px;
            background: rgba(255, 69, 58, 0.15);
            color: var(--danger);
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            padding: 0;
            margin: 0;
        }
        
        /* Revision Tailored Markdown Styling */
        #read-title {
            padding-right: 160px; /* Space for both floating buttons */
            margin-top: 10px;
        }
        #md-content {
            background: var(--surface);
            padding: 24px;
            border-radius: 16px;
            line-height: 1.6;
            font-size: 17px;
            letter-spacing: -0.3px;
            overflow-wrap: break-word;
        }
        #md-content h1, #md-content h2, #md-content h3 { margin-top: 1.5em; margin-bottom: 0.5em; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
        #md-content h1:first-child, #md-content h2:first-child { margin-top: 0; }
        #md-content p { margin-bottom: 1.2em; }
        #md-content strong { color: #fff; background: rgba(255,255,255,0.1); padding: 2px 4px; border-radius: 4px; }
        #md-content blockquote { border-left: 4px solid var(--accent); margin: 0 0 1.2em 0; padding: 4px 16px; background: rgba(10, 132, 255, 0.05); border-radius: 0 8px 8px 0; color: #d1d1d6; font-style: italic; }
        #md-content ul, #md-content ol { padding-left: 20px; margin-bottom: 1.2em; }
        #md-content li { margin-bottom: 6px; }
        #md-content img { max-width: 100%; border-radius: 8px; margin: 12px 0; }
        #md-content pre { background: var(--bg); padding: 16px; border-radius: 12px; overflow-x: auto; border: 1px solid var(--border); }
        #md-content code { font-family: ui-monospace, Menlo, monospace; font-size: 15px; background: var(--bg); padding: 2px 6px; border-radius: 6px; }
        #md-content a { color: var(--accent); text-decoration: none; }
    </style>
</head>
<body>

    <!-- Setup Screen -->
    <div id="setup-screen" class="screen active">
        <h1>Setup</h1>
        <p style="color: var(--subtext); margin-bottom: 24px;">Connect your secure GitHub repository.</p>
        <input type="password" id="gh-token" placeholder="GitHub Personal Access Token">
        <input type="text" id="gh-repo" placeholder="username/revision-notes">
        <button onclick="saveSetup()">Connect & Load</button>
    </div>

    <!-- Notes List Screen -->
    <div id="list-screen" class="screen">
        <div class="header-bar">
            <h1>Revisions</h1>
            <button class="text-btn" onclick="nav('add-screen')">＋ Add</button>
        </div>
        
        <!-- Native iOS Style Search Bar -->
        <input type="search" id="search-input" class="search-bar" placeholder="Search notes..." oninput="filterNotes()">
        
        <div id="notes-list"></div>
    </div>

    <!-- Add Note Screen -->
    <div id="add-screen" class="screen">
        <div class="header-bar" style="margin-bottom: 16px; border:none; padding:0;">
            <button class="text-btn" onclick="nav('list-screen')">Cancel</button>
            <button class="text-btn" id="save-btn" onclick="saveNote()" style="font-weight: 600;">Save</button>
        </div>
        <input type="text" id="note-title" placeholder="Topic / Module Title">
        <textarea id="note-body" placeholder="Write your revision notes here in Markdown..."></textarea>
    </div>

    <!-- Read Note Screen -->
    <div id="read-screen" class="screen">
        <!-- Floating Controls (Back & Copy) -->
        <div class="floating-controls">
            <button class="floating-btn" onclick="nav('list-screen')">← Back</button>
            <button class="floating-btn" id="copy-btn" onclick="copyCurrentNote()">Copy</button>
        </div>
        
        <h2 id="read-title"></h2>
        <div id="md-content"></div>
    </div>

    <script>
        const API_BASE = "https://api.github.com/repos";
        let notesData = [];
        let fileSha = null;
        let currentNoteMarkdown = ""; // Stores the raw markdown for copying

        const encodeBase64 = str => btoa(unescape(encodeURIComponent(str)));
        const decodeBase64 = str => decodeURIComponent(escape(atob(str)));

        function nav(screenId) {
            document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            window.scrollTo(0, 0);
        }

        function init() {
            const token = localStorage.getItem('gh_token');
            const repo = localStorage.getItem('gh_repo');
            if (token && repo) {
                document.getElementById('gh-token').value = token;
                document.getElementById('gh-repo').value = repo;
                fetchNotes();
            }
        }

        function saveSetup() {
            const token = document.getElementById('gh-token').value.trim();
            const repo = document.getElementById('gh-repo').value.trim();
            if (!token || !repo) return alert('Please fill both fields');
            
            localStorage.setItem('gh_token', token);
            localStorage.setItem('gh_repo', repo);
            fetchNotes();
        }

        async function fetchNotes() {
            nav('list-screen');
            document.getElementById('notes-list').innerHTML = "<p style='color: var(--subtext); text-align: center; margin-top: 40px;'>Loading notes securely...</p>";
            
            const token = localStorage.getItem('gh_token');
            const repo = localStorage.getItem('gh_repo');

            try {
                const res = await fetch(`${API_BASE}/${repo}/contents/notes.json`, {
                    headers: {
                        "Authorization": `Bearer ${token}`,
                        "Accept": "application/vnd.github+json",
                        "X-GitHub-Api-Version": "2022-11-28"
                    }
                });

                if (res.status === 404) {
                    notesData = [];
                    fileSha = null;
                    renderList();
                } else if (res.ok) {
                    const data = await res.json();
                    fileSha = data.sha;
                    notesData = JSON.parse(decodeBase64(data.content));
                    renderList();
                } else {
                    throw new Error("Invalid credentials.");
                }
            } catch (err) {
                alert("Connection failed. Please check your token and repo name.");
                nav('setup-screen');
            }
        }

        function filterNotes() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const filtered = notesData.filter(note => 
                note.title.toLowerCase().includes(query) || 
                note.content.toLowerCase().includes(query)
            );
            renderList(filtered);
        }

        function renderList(notesToRender = notesData) {
            const listEl = document.getElementById('notes-list');
            listEl.innerHTML = '';
            
            if (notesToRender.length === 0) {
                if (notesData.length === 0) {
                    listEl.innerHTML = "<p style='color: var(--subtext); text-align: center; margin-top: 40px;'>No notes yet. Tap + to start revising.</p>";
                } else {
                    listEl.innerHTML = "<p style='color: var(--subtext); text-align: center; margin-top: 40px;'>No matching notes found.</p>";
                }
                return;
            }

            notesToRender.forEach(note => {
                const card = document.createElement('div');
                card.className = 'note-card';
                card.onclick = () => openNote(note.id);
                
                const title = document.createElement('h3');
                title.textContent = note.title;
                
                const date = document.createElement('p');
                date.textContent = note.date;

                const delBtn = document.createElement('button');
                delBtn.className = 'delete-btn';
                delBtn.innerHTML = '×';
                delBtn.onclick = (e) => {
                    e.stopPropagation();
                    deleteNote(note.id);
                };

                card.appendChild(title);
                card.appendChild(date);
                card.appendChild(delBtn);
                listEl.appendChild(card);
            });
        }

        function openNote(id) {
            const note = notesData.find(n => n.id === id);
            if (!note) return;
            
            // Store raw content for copying and reset the button text
            currentNoteMarkdown = note.content;
            document.getElementById('copy-btn').textContent = "Copy";

            document.getElementById('read-title').textContent = note.title;
            document.getElementById('md-content').innerHTML = marked.parse(note.content);
            nav('read-screen');
        }

        // New function to handle copying to clipboard
        async function copyCurrentNote() {
            try {
                await navigator.clipboard.writeText(currentNoteMarkdown);
                const copyBtn = document.getElementById('copy-btn');
                copyBtn.textContent = "Copied!";
                
                // Revert button text back after 2 seconds
                setTimeout(() => {
                    if(copyBtn.textContent === "Copied!") {
                        copyBtn.textContent = "Copy";
                    }
                }, 2000);
            } catch (err) {
                alert("Failed to copy text.");
            }
        }

        async function syncToGitHub(updatedData, commitMessage) {
            const token = localStorage.getItem('gh_token');
            const repo = localStorage.getItem('gh_repo');

            const res = await fetch(`${API_BASE}/${repo}/contents/notes.json`, {
                method: 'PUT',
                headers: {
                    "Authorization": `Bearer ${token}`,
                    "Accept": "application/vnd.github+json",
                    "Content-Type": "application/json",
                    "X-GitHub-Api-Version": "2022-11-28"
                },
                body: JSON.stringify({
                    message: commitMessage,
                    content: encodeBase64(JSON.stringify(updatedData, null, 2)),
                    sha: fileSha || undefined
                })
            });

            if (!res.ok) throw new Error("Failed to sync with GitHub");

            const data = await res.json();
            fileSha = data.content.sha;
            notesData = updatedData;
        }

        async function saveNote() {
            const titleEl = document.getElementById('note-title');
            const bodyEl = document.getElementById('note-body');
            const btn = document.getElementById('save-btn');
            
            if (!titleEl.value || !bodyEl.value) return alert("Please enter a title and content.");

            btn.textContent = "Saving...";
            btn.style.opacity = "0.5";
            btn.disabled = true;

            const newNote = {
                id: Date.now().toString(),
                title: titleEl.value,
                content: bodyEl.value,
                date: new Date().toLocaleDateString()
            };

            const updatedNotes = [newNote, ...notesData];

            try {
                await syncToGitHub(updatedNotes, `Add note: ${newNote.title}`);
                titleEl.value = "";
                bodyEl.value = "";
                document.getElementById('search-input').value = ""; 
                renderList();
                nav('list-screen');
            } catch (err) {
                alert(err.message);
            } finally {
                btn.textContent = "Save";
                btn.style.opacity = "1";
                btn.disabled = false;
            }
        }

        async function deleteNote(id) {
            if (!confirm("Are you sure you want to delete this note?")) return;

            document.getElementById('notes-list').style.opacity = "0.5";

            const noteToDelete = notesData.find(n => n.id === id);
            const updatedNotes = notesData.filter(n => n.id !== id);

            try {
                await syncToGitHub(updatedNotes, `Delete note: ${noteToDelete.title}`);
                filterNotes(); 
            } catch (err) {
                alert(err.message);
            } finally {
                document.getElementById('notes-list').style.opacity = "1";
            }
        }

        init();
    </script>
</body>
</html>
